name: Release Please

on:
  push:
    branches:
      - main # メインのブランチ名が master の場合は master に変更してください

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/release-please-action@v4
        with:
          # VS Code拡張機能はNode.jsプロジェクトなので 'node' を指定します
          release-type: node