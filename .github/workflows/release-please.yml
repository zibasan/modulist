name: Release Please

on:
  push:
    branches:
      - main # メインのブランチ名が master の場合は master に変更してください

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/release-please-action@v4
        with:
          # VS Code拡張機能はNode.jsプロジェクトなので 'node' を指定します
          release-type: node

      - name: Debug Release Output
        run: |
          echo "release_created: ${{ steps.release.outputs.release_created }}"
          echo "tag_name: ${{ steps.release.outputs.tag_name }}"

      # 2. リポジトリのコードを取得
      - name: Checkout Repository
        if: ${{ steps.release.outputs.release_created == true || steps.release.outputs.release_created == 'true' }}
        uses: actions/checkout@v4
    
      # 3. pnpm のセットアップ
      - name: Setup pnpm
        if: ${{ steps.release.outputs.release_created == true || steps.release.outputs.release_created == 'true' }}
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # 4. Node.js のセットアップ
      - name: Setup Node.js
        if: ${{ steps.release.outputs.release_created == true || steps.release.outputs.release_created == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
    
      # 5. パッケージのインストール
      - name: Install Dependencies
        if: ${{ steps.release.outputs.release_created == true || steps.release.outputs.release_created == 'true' }}
        run: pnpm install --frozen-lockfile
    
      # 6. .vsix ファイルの作成 (パッケージ化)
      - name: Package Extension
        if: ${{ steps.release.outputs.release_created == true || steps.release.outputs.release_created == 'true' }}
        run: npx @vscode/vsce package
    
      # 7. 作成された .vsix を GitHub Releases にアップロード
      - name: Upload .vsix to Release
        if: ${{ steps.release.outputs.release_created == true || steps.release.outputs.release_created == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # フォルダ内にある拡張子 .vsix のファイルを、先ほど作成されたリリースタグに添付します
          gh release upload ${{ steps.release.outputs.tag_name }} *.vsix